services:
  - type: web
    name: medpremium-api
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install
    startCommand: node server/main.js
    healthCheckPath: /api/inscricoes
    autoDeploy: true
    envVars:
      - key: DB_PATH
        value: /var/data/medpremium.db
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: medpremium-data
      mountPath: /var/data
      sizeGB: 1
